apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-page-deployment
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: static-page
  template:
    metadata:
      labels:
        app: static-page
    spec:
      containers:
      - name: static-page
        image: static-page:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80